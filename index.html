<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kas The'Brother Integrity</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="settings.js"></script>

<style>

  .top-logo{
position:fixed;
top:20px;
left:20px;
z-index:999;
}

.top-logo img{
height:45px;
border-radius:12px;
background:white;
padding:5px;
}
  
:root{
--primary:#4e73df;
--success:#1cc88a;
--danger:#e74a3b;
--card:#ffffff;
}

body{
margin:0;
font-family:Segoe UI,sans-serif;
background:linear-gradient(135deg,#4e73df,#1cc88a);
min-height:100vh;
}

/* ================= INTRO ================= */

#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#071a3a;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
color:white;
}

.logo{
width:130px;
height:130px;
border-radius:50%;
object-fit:cover;
margin-bottom:15px;
box-shadow:0 0 20px #00ffd5;
}

#intro h1{
font-size:22px;
margin-bottom:30px;
}

/* LOADING BAR */

.loading-bar{
width:200px;
height:4px;
background:rgba(255,255,255,0.2);
border-radius:10px;
overflow:hidden;
}

.progress{
height:100%;
width:0%;
background:#00ffd5;
animation:loading 5s linear forwards;
}

@keyframes loading{
0%{width:0%}
100%{width:100%}
}

/* ================= DASHBOARD ================= */

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.top-button{
position:fixed;
top:20px;
right:20px;
z-index:999;
}

.card{
background:var(--card);
padding:25px;
border-radius:20px;
box-shadow:0 15px 35px rgba(0,0,0,0.15);
margin-bottom:20px;
}

h2{
color:white;
margin-top:60px;
}

button{
padding:10px 18px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

.login-btn{
background:#ffffff;
color:#4e73df;
}

.logout-btn{
background:var(--danger);
color:white;
}

.input-btn{
width:100%;
padding:15px;
background:linear-gradient(135deg,#1cc88a,#4e73df);
color:white;
font-size:15px;
font-weight:600;
border-radius:16px;
}

.delete-btn{
width:100%;
padding:12px;
background:linear-gradient(135deg,#e74a3b,#c0392b);
color:white;
font-weight:bold;
border-radius:14px;
}

input,select{
width:100%;
padding:12px;
margin:10px 0;
border-radius:12px;
border:1px solid #ddd;
}

.summary-box{
padding:20px;
border-radius:18px;
color:white;
font-weight:bold;
background:#6f42c1;
margin-bottom:20px;
}

.table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

.table th,.table td{
padding:10px;
border-bottom:1px solid #eee;
}

.table th{
background:#4e73df;
color:white;
}

.badge{
padding:5px 10px;
border-radius:10px;
color:white;
font-size:12px;
}

.masuk{background:#1cc88a;}
.keluar{background:#e74a3b;}

.hidden{display:none;}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">

<img src="https://cdn.danimaru.site/f/5dlEMjg" class="logo">

<h1>The'Brother Integrity</h1>

<div class="loading-bar">
<div class="progress"></div>
</div>

</div>

<!-- DASHBOARD -->

<div class="top-logo">
<img src="https://img2.pixhost.to/images/6241/702140488_zion.jpg">
</div>

<div class="top-button">
<button id="loginBtn" class="login-btn" onclick="showLogin()">Login Admin</button>
<button id="logoutBtn" class="logout-btn hidden" onclick="logout()">Logout</button>
</div>

<div class="container">

<h2>Dashboard Kas The'Brother Integrity</h2>

<div class="summary-box">
Total Keseluruhan Kas <br>
Rp <span id="totalKas">0</span>
</div>

<div class="card">
<h3>Grafik Line Saldo Anggota</h3>
<canvas id="lineChart"></canvas>
</div>

<div class="card">
<h3>Grafik Bar Saldo Anggota</h3>
<canvas id="barChart"></canvas>
</div>

<div class="card">
<h3>Ringkasan Anggota</h3>
<table class="table">
<thead>
<tr>
<th>Nama</th>
<th>Saldo</th>
<th>Aktivitas Saldo</th>
</tr>
</thead>
<tbody id="ringkasanTable"></tbody>
</table>
</div>

</div>

<script>

const _supabase = supabase.createClient(configs.supabaseUrl, configs.supabaseKey)

let lineChart
let barChart

/* INTRO */

setTimeout(()=>{
document.getElementById("intro").style.display="none"
},5000)

/* LOAD DATA */

async function loadData(){

const { data: users } = await _supabase.from('anggota').select('*').order('nama')
const { data: allKas } = await _supabase.from('kas').select('*').order('created_at',{ascending:true})

let total=0
let labels=[]
let dataChart=[]
let table=document.getElementById("ringkasanTable")

table.innerHTML=""

users.forEach(u=>{

let userKas=allKas.filter(k=>k.nama_anggota===u.nama)
let saldo=0

userKas.forEach(k=>{
saldo+=k.jenis==="masuk"?k.nominal:-k.nominal
})

total+=saldo

labels.push(u.nama)
dataChart.push(saldo)

let last=userKas.length>0?userKas[userKas.length-1].jenis:"-"

let badge=
last==="masuk"?`<span class="badge masuk">Masuk</span>`:
last==="keluar"?`<span class="badge keluar">Keluar</span>`:"-"

table.innerHTML+=`
<tr>
<td>${u.nama}</td>
<td>Rp ${saldo.toLocaleString()}</td>
<td>${badge}</td>
</tr>`

})

document.getElementById("totalKas").innerText=total.toLocaleString()

renderCharts(labels,dataChart)

}

function renderCharts(labels,data){

if(lineChart) lineChart.destroy()
if(barChart) barChart.destroy()

lineChart=new Chart(document.getElementById("lineChart"),{
type:"line",
data:{
labels:labels,
datasets:[{
data:data,
borderColor:"#4e73df",
backgroundColor:"rgba(78,115,223,0.2)",
tension:0.4,
fill:true
}]
},
options:{plugins:{legend:{display:false}}}
})

barChart=new Chart(document.getElementById("barChart"),{
type:"bar",
data:{
labels:labels,
datasets:[{
data:data,
backgroundColor:"#1cc88a"
}]
},
options:{plugins:{legend:{display:false}}}
})

}

loadData()

</script>

</body>
  </html>
